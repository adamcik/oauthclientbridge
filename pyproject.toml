[project]
authors = [{ name = "Thomas Adamcik", email = "thomas@adamcik.no" }]
license = { text = "Apache-2.0" }
requires-python = "<3.13,>=3.12"
dependencies = [
  "Flask~=3.1.1",
  "werkzeug~=3.1.3",
  "cryptography~=45.0.5",
  "prometheus-client~=0.22.1",
  "requests~=2.32.4",
  "pydantic~=2.11.7",
  "pydantic-settings~=2.10.1",
  "structlog~=25.4.0",
]
name = "oauthclientbridge"
version = "2.0.0"
readme = "README.md"
description = "Bridge OAuth2 Authorization Code Grants to Clients Grants"
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
]

[project.urls]
repository = "https://github.com/adamcik/oauthclientbridge"

[dependency-groups]
sentry = [
  "sentry-sdk~=2.33.2",
  "structlog-sentry~=2.2.1",
]
dev = [
  { include-group = "test" },
  { include-group = "typing" },
  { include-group = "lint" },
  { include-group = "sentry" },
]
typing = ["types-requests", "basedpyright"]
test = ["pytest", "pytest-cov", "requests_mock"]
lint = ["ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
extend-select = ["I"]

[tool.ruff.lint.isort]
known-local-folder = ["src"]

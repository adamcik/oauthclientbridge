name: CI

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      # Testing if running without is actually faster
      # - name: Enable Magic Nix Cache
      #   uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Run nix fmt
        run: nix fmt

      - name: Run nix flake check
        run: nix flake check

      - name: Compute version override
        run: |
          BUILD_OVERRIDES="${RUNNER_TEMP}/.build-overrides"
          echo "BUILD_OVERRIDES=${BUILD_OVERRIDES}" >> "$GITHUB_ENV"
          VERSION="$(nix develop -c hatchling version)"
          REVISION="$(git rev-parse HEAD)"
          CREATED="$(git show -s --format=%cI HEAD)"
          jq -n \
            --arg version "$VERSION" \
            --arg revision "$REVISION" \
            --arg created "$CREATED" \
            '{version:$version, revision:$revision, created:$created}' \
            | tee "$BUILD_OVERRIDES"
          test -s "$BUILD_OVERRIDES"

      - name: Build image
        run: nix build .#image --override-input build-overrides "path:${BUILD_OVERRIDES}"

      - name: Login to GHCR
        if: |
          (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) ||
          github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_ACTOR: ${{ github.actor }}
        run: echo "${GH_TOKEN}" | skopeo login ghcr.io -u "${GH_ACTOR}" --password-stdin

      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        run: nix run .#image.copyToRegistry --override-input build-overrides "path:${BUILD_OVERRIDES}"

      - name: Push release-tagged image to GHCR
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: nix run .#image.copyTo --override-input build-overrides "path:${BUILD_OVERRIDES}" -- "docker://ghcr.io/adamcik/oauthclientbridge:${RELEASE_TAG}"

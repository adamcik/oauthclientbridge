name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  nix:
    name: Nix checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v19

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Run nix fmt
        run: nix fmt

      - name: Run nix flake check
        run: nix flake check
